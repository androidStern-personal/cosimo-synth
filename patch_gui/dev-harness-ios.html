<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cosimo iOS Patch Harness</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #05070a;
      color: #eef2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Avenir Next", sans-serif;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .phone-host {
      width: min(100vw - 32px, 393px);
      height: min(100dvh - 32px, 852px);
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, #090c11 0%, #05070a 100%);
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.38);
    }

    #host {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="phone-host">
    <div id="host"></div>
  </div>
  <script id="harness-metrics" type="application/json">{}</script>
  <script type="module" src="./dev-harness-ios.mjs"></script>
</body>
</html>
