<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cosimo Wavetable Renderer Harness</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Avenir Next", Avenir, sans-serif;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #02040b;
      color: #f3f0ff;
    }

    body {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(4, 7, 18, 0.96);
      border: 1px solid rgba(122, 142, 255, 0.18);
      box-shadow: 0 18px 50px rgba(4, 8, 20, 0.35);
    }

    .controls label {
      display: grid;
      gap: 4px;
      min-width: 240px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(151, 167, 255, 0.84);
    }

    .controls input[type="range"] {
      width: 280px;
    }

    .controls output,
    .controls .status {
      font-variant-numeric: tabular-nums;
      color: #ffd8a6;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .viewport {
      min-height: 520px;
      border-radius: 20px;
      border: 1px solid rgba(122, 142, 255, 0.14);
      background: rgba(4, 7, 18, 0.94);
      box-shadow: 0 22px 56px rgba(4, 8, 20, 0.42);
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .title {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(141, 162, 255, 0.84);
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1.9 / 1;
      min-height: 320px;
      border-radius: 16px;
      overflow: hidden;
      background: #04070f;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .caption {
      font-size: 13px;
      color: rgba(194, 202, 255, 0.74);
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>
      Wavetable Position
      <input id="position" type="range" min="0" max="1" step="0.001" value="0.5" />
    </label>
    <output id="position-value">0.500</output>
    <label style="min-width: unset;">
      Animate
      <input id="animate" type="checkbox" />
    </label>
    <div class="status" id="status">Loading renderer…</div>
  </div>

  <div class="viewport">
    <div class="title">Canvas Renderer Only</div>
    <div class="stage" id="stage">
      <canvas id="canvas"></canvas>
    </div>
    <div class="caption">This page feeds the real display-demo bank straight into the isolated canvas renderer, without the rest of the plugin UI.</div>
  </div>

  <script type="module" src="./renderer-harness.mjs"></script>
</body>
</html>
