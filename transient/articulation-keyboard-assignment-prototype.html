<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Cosimo · Articulation Assignment · Prototype</title>
<style>
  :root {
    --bg-deep:     #04070f;
    --bg-shell:    #080b14;
    --panel:       #0d1322;
    --panel-2:     #121a2c;
    --panel-3:     #182238;
    --line:        rgba(255,255,255,0.07);
    --line-2:      rgba(255,255,255,0.14);
    --line-3:      rgba(255,255,255,0.22);

    --ink:         #eef2f5;
    --ink-2:       #c4ccda;
    --muted:       rgba(238,242,245,0.55);
    --faint:       rgba(238,242,245,0.34);
    --ghost:       rgba(238,242,245,0.16);

    --cyan:        #87d7f5;
    --cyan-line:   rgba(135,215,245,0.45);
    --cyan-haze:   rgba(135,215,245,0.16);

    --pink:        #f56cb6;
    --pink-line:   rgba(245,108,182,0.45);
    --pink-haze:   rgba(245,108,182,0.16);

    --amber:       #ffd8a6;
    --amber-line:  rgba(255,216,166,0.45);
    --amber-haze:  rgba(255,216,166,0.14);

    --green:       #32f0bc;
    --green-line:  rgba(50,240,188,0.45);
    --green-haze:  rgba(50,240,188,0.14);

    --red:         #f87171;
    --red-line:    rgba(248,113,113,0.45);
    --red-haze:    rgba(248,113,113,0.14);

    --violet:      #b18cf5;
    --violet-line: rgba(177,140,245,0.45);
    --violet-haze: rgba(177,140,245,0.14);

    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Segoe UI", system-ui, sans-serif;

    --r-1: 4px;
    --r-2: 6px;
    --r-3: 10px;
    --r-4: 14px;

    --t-fast: 110ms cubic-bezier(.4,.2,.2,1);
    --t-med:  180ms cubic-bezier(.4,.2,.2,1);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(900px 600px at 80% -10%, rgba(135,215,245,0.04), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(245,108,182,0.03), transparent 60%),
      var(--bg-deep);
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input { font: inherit; color: inherit; }
  :focus { outline: none; }
  :focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 1px;
    border-radius: var(--r-2);
  }

  /* ── Shell ───────────────────────────────────────────── */

  .shell {
    width: 1200px;
    height: 760px;
    background: var(--bg-shell);
    border: 1px solid var(--line-2);
    border-radius: 18px;
    padding: 14px;
    display: grid;
    grid-template-rows: 36px 1fr 22px;
    gap: 8px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  /* ── Topbar ──────────────────────────────────────────── */

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px;
    border: 1px solid var(--line-2);
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border-radius: var(--r-3);
  }
  .brand {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    padding-right: 12px;
    border-right: 1px solid var(--line-2);
  }
  .brand b { color: var(--ink); font-weight: 700; }
  .crumb {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--faint);
    text-transform: uppercase;
  }
  .crumb b { color: var(--ink-2); font-weight: 600; }
  .crumb .sep { color: var(--ghost); padding: 0 8px; }
  .topbar .grow { flex: 1; }
  .precedence {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .precedence .step {
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    color: var(--ink-2);
  }
  .precedence .gt { color: var(--ghost); }

  /* ── Above-keyboard panel ────────────────────────────── */

  .above {
    display: grid;
    grid-template-rows: 1fr 156px;
    gap: 8px;
    min-height: 0;
  }
  .panel {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line-2);
    border-radius: var(--r-3);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mode-toggle {
    display: inline-flex;
    padding: 3px;
    border: 1px solid var(--line-2);
    background: var(--panel);
    border-radius: var(--r-3);
  }
  .mode-toggle button {
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border-radius: var(--r-2);
    transition: var(--t-fast);
  }
  .mode-toggle button.active {
    color: var(--ink);
    background: var(--panel-3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .mode-toggle button:hover:not(.active) { color: var(--ink-2); }

  .sub-tabs {
    display: inline-flex;
    padding: 3px;
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.18);
    border-radius: var(--r-3);
  }
  .sub-tabs button {
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    border-radius: var(--r-2);
  }
  .sub-tabs button.active {
    color: var(--cyan);
    background: var(--cyan-haze);
    box-shadow: inset 0 0 0 1px var(--cyan-line);
  }
  .sub-tabs button:hover:not(.active) { color: var(--ink-2); }

  .head-spacer { flex: 1; }
  .hint {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Articulation cards strip ────────────────────────── */

  .cards-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 2px;
    scrollbar-width: thin;
  }
  .cards-strip::-webkit-scrollbar { height: 6px; }
  .cards-strip::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

  .card {
    flex: 0 0 200px;
    height: 96px;
    border: 1px solid var(--line-2);
    background: linear-gradient(180deg, var(--panel-3), var(--panel-2));
    border-radius: var(--r-3);
    padding: 8px 10px;
    display: grid;
    grid-template-rows: 18px 26px 1fr;
    gap: 4px;
    cursor: grab;
    transition: var(--t-fast);
    position: relative;
  }
  .card:hover { border-color: var(--line-3); }
  .card.selected {
    border-color: var(--cyan-line);
    box-shadow: 0 0 0 1px var(--cyan-line), 0 6px 24px rgba(135,215,245,0.08);
  }
  .card.dragging { opacity: 0.5; cursor: grabbing; }

  .card .card-top {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card .swatch {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .card .name {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .card .sel-pill {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
    padding: 2px 6px;
    border: 1px solid var(--line);
    border-radius: var(--r-1);
    background: rgba(0,0,0,0.18);
  }
  .card .sel-pill b { color: var(--ink); font-weight: 700; }
  .card .previews {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    align-items: stretch;
  }
  .card .preview {
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    background: rgba(0,0,0,0.22);
    padding: 3px 4px 1px;
    display: flex;
    flex-direction: column;
  }
  .card .preview .pv-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.16em;
    color: var(--faint);
    text-transform: uppercase;
  }
  .card .preview svg { width: 100%; height: 100%; display: block; }

  /* ── View content (per sub-mode) ─────────────────────── */

  .view {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .view-head {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .view-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .view-title b { color: var(--ink-2); }
  .view-body {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    background: rgba(0,0,0,0.18);
    padding: 10px;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  .btn {
    padding: 5px 10px;
    border: 1px solid var(--line-2);
    border-radius: var(--r-2);
    background: var(--panel-2);
    color: var(--ink-2);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    transition: var(--t-fast);
  }
  .btn:hover { color: var(--ink); border-color: var(--line-3); }
  .btn:disabled { opacity: 0.32; cursor: default; }
  .btn.primary { color: var(--cyan); border-color: var(--cyan-line); background: var(--cyan-haze); }
  .btn.danger { color: var(--red); border-color: var(--red-line); background: var(--red-haze); }
  .btn.danger:hover { background: rgba(248,113,113,0.22); }

  /* Cards view body */
  .cards-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .cards-edit {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 8px 12px;
    align-items: center;
  }
  .cards-edit label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .cards-edit input[type="text"], .cards-edit input[type="number"] {
    width: 100%;
    padding: 6px 8px;
    background: rgba(0,0,0,0.32);
    border: 1px solid var(--line-2);
    border-radius: var(--r-2);
    color: var(--ink);
  }
  .cards-edit input:focus { border-color: var(--cyan-line); }
  .color-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .color-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--line);
    cursor: pointer;
    transition: var(--t-fast);
  }
  .color-dot:hover { transform: scale(1.08); }
  .color-dot.selected {
    border: 2px solid var(--ink);
    transform: scale(1.08);
  }

  /* Keys view body */
  .keys-body {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 12px;
    height: 100%;
  }
  .keys-help {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .keys-help b { color: var(--ink-2); font-weight: 600; }
  .keys-help kbd {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 6px;
    border: 1px solid var(--line-2);
    border-radius: var(--r-1);
    background: var(--panel-3);
    color: var(--ink);
  }
  .keys-table {
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    background: rgba(0,0,0,0.22);
    overflow: hidden;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .keys-table-head {
    display: grid;
    grid-template-columns: 64px 1fr 24px;
    padding: 6px 8px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .keys-table-rows {
    overflow-y: auto;
    flex: 1;
  }
  .keys-table-rows::-webkit-scrollbar { width: 6px; }
  .keys-table-rows::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  .key-row {
    display: grid;
    grid-template-columns: 64px 1fr 24px;
    align-items: center;
    padding: 6px 8px;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
    cursor: pointer;
    transition: var(--t-fast);
  }
  .key-row:hover { background: rgba(255,255,255,0.04); }
  .key-row.selected { background: var(--cyan-haze); }
  .key-row .note {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-2);
  }
  .key-row .lbl {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
  }
  .key-row .lbl span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .key-row .x {
    color: var(--faint);
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
  }
  .key-row .x:hover { color: var(--red); }

  /* Keys inspector chrome */
  .ks-inspector {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .ks-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    background: rgba(0,0,0,0.22);
    min-height: 34px;
  }
  .ks-strip-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    padding-right: 10px;
    border-right: 1px solid var(--line);
    min-width: 70px;
  }
  .ks-key-pill {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--cyan);
    background: var(--cyan-haze);
    border: 1px solid var(--cyan-line);
    padding: 3px 10px;
    border-radius: var(--r-1);
    min-width: 44px;
    text-align: center;
  }
  .ks-key-pill.empty {
    color: var(--faint);
    background: rgba(0,0,0,0.18);
    border-color: var(--line);
  }
  .ks-arrow {
    color: var(--ghost);
    font-family: var(--mono);
    font-size: 12px;
  }
  .ks-card-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    padding: 3px 10px 3px 8px;
    border: 1px solid var(--line-2);
    border-radius: var(--r-1);
    background: var(--panel-3);
    overflow: hidden;
    min-width: 0;
    flex: 1;
  }
  .ks-card-pill .swatch {
    width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
  }
  .ks-card-pill > span:last-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ks-card-pill.empty {
    color: var(--faint);
    font-weight: 500;
    background: rgba(0,0,0,0.18);
    border-color: var(--line);
  }
  .ks-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
    padding: 4px 8px;
    border: 1px solid var(--line-2);
    border-radius: var(--r-1);
    background: rgba(0,0,0,0.18);
  }
  .ks-chip kbd {
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 5px;
    border: 1px solid var(--line-2);
    border-radius: 3px;
    background: var(--panel-3);
    color: var(--ink);
    letter-spacing: 0.06em;
  }
  .ks-stat {
    font-size: 12px;
    color: var(--ink-2);
  }
  .ks-stat b {
    color: var(--ink);
    font-weight: 700;
    font-family: var(--mono);
  }
  .ks-mono {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.06em;
  }
  .ks-divider {
    color: var(--ghost);
    font-family: var(--mono);
  }

  /* Velocity view body */
  .vel-body {
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .vel-axis {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--faint);
    text-transform: uppercase;
    padding: 0 2px;
  }
  .vel-lane {
    flex: 1;
    position: relative;
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    background:
      repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent calc(100%/16 - 1px),
        rgba(255,255,255,0.04) calc(100%/16 - 1px),
        rgba(255,255,255,0.04) calc(100%/16)
      ),
      rgba(0,0,0,0.36);
    min-height: 80px;
    overflow: hidden;
  }
  .vel-lane.drag-over {
    border-color: var(--cyan-line);
    background:
      repeating-linear-gradient(
        90deg,
        transparent 0,
        transparent calc(100%/16 - 1px),
        rgba(255,255,255,0.04) calc(100%/16 - 1px),
        rgba(255,255,255,0.04) calc(100%/16)
      ),
      var(--cyan-haze);
  }
  .vel-band {
    position: absolute;
    top: 8px;
    bottom: 8px;
    border-radius: var(--r-2);
    border: 1px solid;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    color: var(--ink);
    font-size: 11px;
    font-weight: 600;
    cursor: default;
    user-select: none;
    overflow: hidden;
  }
  .vel-band.selected { box-shadow: 0 0 0 1px var(--ink), 0 6px 16px rgba(0,0,0,0.5); }
  .vel-band .vel-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .vel-band .vel-rng {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.55);
    background: rgba(255,255,255,0.6);
    padding: 1px 5px;
    border-radius: var(--r-1);
  }
  .vel-handle {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 6px;
    cursor: ew-resize;
    background: rgba(255,255,255,0.2);
  }
  .vel-handle.l { left: 0; border-radius: var(--r-2) 0 0 var(--r-2); }
  .vel-handle.r { right: 0; border-radius: 0 var(--r-2) var(--r-2) 0; }
  .vel-handle:hover { background: rgba(255,255,255,0.45); }
  .vel-band-x {
    color: rgba(255,255,255,0.7);
    font-family: var(--mono);
    cursor: pointer;
    padding: 0 2px;
  }
  .vel-band-x:hover { color: var(--ink); }

  /* Host view body */
  .host-body {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
    height: 100%;
    overflow: hidden;
  }
  .host-table {
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .host-thead {
    display: grid;
    grid-template-columns: 24px 1fr 110px 110px 1fr;
    padding: 6px 10px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
    background: rgba(0,0,0,0.32);
  }
  .host-rows { overflow-y: auto; flex: 1; }
  .host-rows::-webkit-scrollbar { width: 6px; }
  .host-rows::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  .host-row {
    display: grid;
    grid-template-columns: 24px 1fr 110px 110px 1fr;
    align-items: center;
    padding: 8px 10px;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
  }
  .host-row.selected { background: var(--cyan-haze); }
  .host-row .swatch { width: 10px; height: 10px; border-radius: 2px; }
  .host-row .name {
    font-weight: 600;
    color: var(--ink);

    padding: 4px 6px;
    background: rgba(0,0,0,0.36);

  .v-tile .v-value {
    font-family: var(--mono);
    font-size: 18px;

  /* ── Piano keyboard ──────────────────────────────────── */

  .keyboard-wrap {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));

    flex-direction: column;
    gap: 6px;

  .kb-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 18px;

  .kb-head .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);

  .kb-head .label b { color: var(--ink-2); }
  .kb-head .kb-actions {
    display: flex;
    gap: 6px;
    align-items: center;

  .keyboard {
    flex: 1;
    position: relative;
    user-select: none;
    border-radius: var(--r-2);
    overflow: hidden;
    display: flex;
    background: #000;

  .key-white {
    flex: 1 1 0;
    border-right: 1px solid #1a1a1a;
    background: linear-gradient(180deg, #f6f3ec 0%, #d8d2c5 100%);

    cursor: pointer;
    transition: background var(--t-fast);

  .key-white:last-child { border-right: 0; }
  .key-white:hover { background: linear-gradient(180deg, #fff 0%, #e0d9c8 100%); }
  .key-white.drag-over {
    background: linear-gradient(180deg, var(--cyan-haze), var(--cyan));

  .key-white.selected {
    box-shadow: inset 0 3px 0 var(--cyan), inset 0 -3px 0 var(--cyan);

  .key-black {
    position: absolute;
    top: 0;
    height: 60%;
    background: linear-gradient(180deg, #1a1f2a 0%, #050810 100%);
    border: 1px solid #000;
    border-top: 0;

  .key-black:hover { background: linear-gradient(180deg, #2a3142 0%, #0c1018 100%); }
  .key-black.drag-over {
    background: linear-gradient(180deg, var(--cyan), var(--cyan-line));
  }
  .key-black.selected {
    box-shadow: inset 0 3px 0 var(--cyan), inset 0 -3px 0 var(--cyan);
  }
  .key-overlay {
    position: absolute;
    left: 2px;
    right: 2px;
    bottom: 2px;
    border-radius: 2px;
    padding: 2px 3px 3px;
    font-size: 9px;
    line-height: 1;
    font-weight: 700;
    color: #000;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .key-black .key-overlay {
    color: #fff;
    bottom: 3px;
  }
  .key-c-label {
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 8px;
    color: var(--ghost);

  .key-white.has-overlay .key-c-label { color: rgba(0,0,0,0.45); }

  /* ── Status bar ──────────────────────────────────────── */

  .statusbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    background: rgba(0,0,0,0.32);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .statusbar .tag {
    color: var(--cyan);
    border: 1px solid var(--cyan-line);
    padding: 2px 6px;
    border-radius: var(--r-1);
  }
  .statusbar .grow { flex: 1; }
  .statusbar .meta { color: var(--faint); }

  .invisible { display: none !important; }
</style>
</head>
<body>
<div class="shell" id="shell">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand"><b>COSIMO</b> SYNTH</div>
    <div class="crumb"><b>Patch</b><span class="sep">/</span>Routing<span class="sep">/</span><b>Articulations</b></div>
    <div class="grow"></div>
    <div class="precedence" title="Trigger precedence — highest first">
      <span class="step">Host&nbsp;SelA · Sysex</span>
      <span class="gt">›</span>
      <span class="step">Keyswitch</span>
      <span class="gt">›</span>
      <span class="step">Velocity</span>
      <span class="gt">›</span>
      <span class="step">Default</span>
    </div>
  </div>

  <!-- Above keyboard area -->
  <div class="above">
    <div class="panel" id="panel">

      <!-- Mode + sub-tabs row -->
      <div class="panel-head">
        <div class="mode-toggle" id="modeToggle">
          <button data-mode="voicing">Voicing</button>
          <button data-mode="articulations" class="active">Articulations</button>
        </div>
        <div class="sub-tabs" id="subTabs">
          <button data-sub="cards" class="active">Cards</button>
          <button data-sub="keys">Keys</button>
          <button data-sub="velocity">Velocity</button>
          <button data-sub="host">Host</button>
        </div>
        <div class="head-spacer"></div>
        <div class="hint" id="headHint">Selected · <b id="headSelName" style="color:var(--ink-2)">—</b></div>
      </div>

      <!-- Cards strip (always visible in articulations mode) -->
      <div class="cards-strip" id="cardsStrip"></div>

      <!-- Per sub-mode view -->
      <div class="view" id="view">
        <div class="view-head">
          <div class="view-title" id="viewTitle"><b>Cards</b> · definitions</div>
          <div class="head-spacer"></div>
          <div id="viewActions" style="display:flex;gap:6px;"></div>
        </div>
        <div class="view-body" id="viewBody"></div>
      </div>

    </div>

    <!-- Voicing mode placeholder content (mounted under .above when in voicing mode) -->

    <!-- Keyboard -->
    <div class="keyboard-wrap">
      <div class="kb-head">
        <div class="label">Range · <b id="kbRangeLabel">C1 — C7</b> · <b id="kbSelectedLabel">No key selected</b></div>
        <div class="kb-actions">
          <button class="btn" id="kbClearAll">Clear all keyswitches</button>
        </div>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span class="tag" id="statusTag">READY</span>
    <span id="statusMsg">Idle.</span>
    <span class="grow"></span>
    <span class="meta" id="statusMeta"></span>
  </div>

</div>

<script>
"use strict";

// ── Constants ─────────────────────────────────────────────

const COLORS = [
  { id: "cyan",   line: "rgba(135,215,245,0.92)", fill: "#87d7f5" },
  { id: "amber",  line: "rgba(255,216,166,0.92)", fill: "#ffd8a6" },
  { id: "pink",   line: "rgba(245,108,182,0.92)", fill: "#f56cb6" },
  { id: "green",  line: "rgba(50,240,188,0.92)",  fill: "#32f0bc" },
  { id: "red",    line: "rgba(248,113,113,0.92)", fill: "#f87171" },
  { id: "violet", line: "rgba(177,140,245,0.92)", fill: "#b18cf5" },
];
const COLOR_BY_ID = Object.fromEntries(COLORS.map(c => [c.id, c]));

const KB_LO = 24; // C1
const KB_HI = 96; // C7
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const isBlack = n => [1,3,6,8,10].includes(n % 12);
const noteLabel = n => NOTE_NAMES[n % 12] + (Math.floor(n / 12) - 1);

// ── State ─────────────────────────────────────────────────

let nextId = 1;
const newId = () => "a" + (nextId++);

const state = {
  mode: "articulations",     // "voicing" | "articulations"
  sub: "cards",              // "cards" | "keys" | "velocity" | "host"
  cards: [
    { id: newId(), name: "Sustain",     selectorA:  0, color: "cyan",   adsr:{a:0.05,d:0.20,s:0.85,r:0.40}, msegSeed:1 },
    { id: newId(), name: "Marcato",     selectorA: 12, color: "amber",  adsr:{a:0.01,d:0.16,s:0.55,r:0.18}, msegSeed:2 },
    { id: newId(), name: "Staccato",    selectorA: 24, color: "pink",   adsr:{a:0.005,d:0.10,s:0.0,r:0.06}, msegSeed:3 },
    { id: newId(), name: "Trill",       selectorA: 36, color: "green",  adsr:{a:0.04,d:0.20,s:0.70,r:0.30}, msegSeed:4 },
    { id: newId(), name: "Falls",       selectorA: 48, color: "red",    adsr:{a:0.20,d:0.30,s:0.40,r:0.50}, msegSeed:5 },
  ],
  selectedCardId: null,
  keyswitches: {},                     // midiNote -> cardId
  velocityBands: [],                   // {id, cardId, min, max}
  selectedKey: null,
  selectedBandId: null,
};
state.selectedCardId = state.cards[0].id;
// seed an example keyswitch and a velocity band so the prototype reads
state.keyswitches[36] = state.cards[0].id;          // C2 → Sustain
state.keyswitches[37] = state.cards[1].id;          // C#2 → Marcato
state.velocityBands.push({ id: newId(), cardId: state.cards[2].id, min: 0,   max: 39  });
state.velocityBands.push({ id: newId(), cardId: state.cards[0].id, min: 40,  max: 95  });
state.velocityBands.push({ id: newId(), cardId: state.cards[1].id, min: 96,  max: 127 });

// ── Utilities ─────────────────────────────────────────────

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function cardById(id) { return state.cards.find(c => c.id === id) || null; }
function selectedCard() { return cardById(state.selectedCardId); }

function setStatus(msg, kind = "ok") {
  const tag = $("#statusTag"), m = $("#statusMsg"), meta = $("#statusMeta");
  m.textContent = msg;
  const labels = { ok: "READY", info: "INFO", warn: "WARN", err: "ERROR", drag: "DRAG" };
  tag.textContent = labels[kind] || "READY";
  const colorMap = {
    ok:   { c: "var(--cyan)",  b: "var(--cyan-line)" },
    info: { c: "var(--ink-2)", b: "var(--line-2)" },
    warn: { c: "var(--amber)", b: "var(--amber-line)" },
    err:  { c: "var(--red)",   b: "var(--red-line)" },
    drag: { c: "var(--green)", b: "var(--green-line)" },
  };
  const palette = colorMap[kind] || colorMap.ok;
  tag.style.color = palette.c;
  tag.style.borderColor = palette.b;
  const t = new Date();
  meta.textContent = t.toTimeString().slice(0,8);
}

// ── MSEG / ADSR previews ──────────────────────────────────

function msegPath(seed) {
  const w = 80, h = 24;
  const r = (k) => {
    let x = Math.sin(seed * 9301 + k * 49297) * 233280;
    return x - Math.floor(x);
  };
  const pts = [];
  const N = 5;
  for (let i = 0; i <= N; i++) {
    const x = (i / N) * w;
    const y = 4 + r(i + 1) * (h - 8);
    pts.push([x, y]);
  }
  return pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
}

function adsrPath(adsr) {
  const w = 80, h = 24, padY = 3;
  const segW = w / 4;
  const yTop = padY, yBottom = h - padY;
  const sustainY = yBottom - (yBottom - yTop) * (adsr.s);
  const ax = adsr.a / 0.5 * segW;          // attack length within first segment
  const dx = adsr.d / 0.5 * segW;          // decay length within second segment
  const rx = adsr.r / 0.6 * segW;          // release within last segment
  const x0 = 0, y0 = yBottom;
  const x1 = Math.min(segW, ax), y1 = yTop;
  const x2 = x1 + Math.min(segW, dx), y2 = sustainY;
  const x3 = w - segW;                                      // sustain shelf
  const y3 = sustainY;
  const x4 = Math.min(w, x3 + rx), y4 = yBottom;
  return `M${x0},${y0} L${x1.toFixed(1)},${y1} L${x2.toFixed(1)},${y2.toFixed(1)} L${x3},${y3.toFixed(1)} L${x4.toFixed(1)},${y4}`;
}

// ── Render: Cards strip ───────────────────────────────────

function renderCardsStrip() {
  const root = $("#cardsStrip");
  root.innerHTML = "";
  state.cards.forEach(card => {
    const color = COLOR_BY_ID[card.color];
    const el = document.createElement("div");
    el.className = "card" + (card.id === state.selectedCardId ? " selected" : "");
    el.draggable = true;
    el.dataset.cardId = card.id;
    el.title = "Drag to a key, velocity lane, or click to select.";
    el.innerHTML = `
      <div class="card-top">
        <span class="swatch" style="background:${color.fill}"></span>
        <span class="name">${escapeHtml(card.name)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="sel-pill">SELA <b>${card.selectorA}</b></span>
        <span class="sel-pill" style="opacity:0.7">0x${card.selectorA.toString(16).toUpperCase().padStart(2,"0")}</span>
      </div>
      <div class="previews">
        <div class="preview">
          <div class="pv-label">MSEG</div>
          <svg viewBox="0 0 80 24" preserveAspectRatio="none">
            <path d="${msegPath(card.msegSeed)}" fill="none" stroke="${color.fill}" stroke-width="1.4"/>
          </svg>
        </div>
        <div class="preview">
          <div class="pv-label">GAIN</div>
          <svg viewBox="0 0 80 24" preserveAspectRatio="none">
            <path d="${adsrPath(card.adsr)}" fill="none" stroke="${color.fill}" stroke-width="1.4"/>
          </svg>
        </div>
      </div>
    `;
    el.addEventListener("click", () => {
      state.selectedCardId = card.id;
      renderAll();
      setStatus(`Selected card "${card.name}" · selectorA ${card.selectorA}`, "info");
    });
    el.addEventListener("dragstart", (e) => {
      el.classList.add("dragging");
      e.dataTransfer.effectAllowed = "copy";
      e.dataTransfer.setData("application/x-cosimo-card", card.id);
      e.dataTransfer.setData("text/plain", card.name);
      setStatus(`Dragging "${card.name}" — drop on a key or velocity lane.`, "drag");
    });
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    root.appendChild(el);
  });
}

// ── Render: View panel ────────────────────────────────────

function renderView() {
  if (state.mode === "voicing") {
    renderVoicingView();
    return;
  }
  $("#cardsStrip").classList.remove("invisible");
  const title = $("#viewTitle"), actions = $("#viewActions"), body = $("#viewBody");
  actions.innerHTML = "";
  body.innerHTML = "";

  if (state.sub === "cards")    return renderCardsView(title, actions, body);
  if (state.sub === "keys")     return renderKeysView(title, actions, body);
  if (state.sub === "velocity") return renderVelocityView(title, actions, body);
  if (state.sub === "host")     return renderHostView(title, actions, body);
}

function renderVoicingView() {
  $("#cardsStrip").classList.add("invisible");
  const title = $("#viewTitle"), actions = $("#viewActions"), body = $("#viewBody");
  title.innerHTML = "<b>Voicing</b> · polyphony &amp; allocation";
  actions.innerHTML = "";
  body.innerHTML = `
    <div class="voicing-body">
      <div class="v-tile"><div class="v-label">Polyphony</div><div class="v-value">8</div><div class="v-bar"><i style="width:50%"></i></div></div>
      <div class="v-tile"><div class="v-label">Mode</div><div class="v-value" style="font-family:var(--sans);font-size:14px;font-weight:600">Poly</div><div class="v-bar"><i style="width:33%"></i></div></div>
      <div class="v-tile"><div class="v-label">Glide</div><div class="v-value">42 ms</div><div class="v-bar"><i style="width:42%"></i></div></div>
      <div class="v-tile"><div class="v-label">Voice Stack</div><div class="v-value">×2</div><div class="v-bar"><i style="width:25%"></i></div></div>
    </div>`;
}

// Cards view
function renderCardsView(title, actions, body) {
  const c = selectedCard();
  title.innerHTML = "<b>Cards</b> · definitions";
  actions.innerHTML = `
    <button class="btn primary" id="btnAdd">+ Add</button>
    <button class="btn" id="btnClone">Clone state</button>
    <button class="btn" id="btnRename" ${c ? "" : "disabled"}>Rename</button>
    <button class="btn" id="btnDuplicate" ${c ? "" : "disabled"}>Duplicate</button>
    <button class="btn danger" id="btnDelete" ${c && state.cards.length > 1 ? "" : "disabled"}>Delete</button>
  `;
  if (!c) {
    body.innerHTML = `<div class="keys-help" style="padding:24px;text-align:center;">No card selected.</div>`;
    return;
  }
  const color = COLOR_BY_ID[c.color];
  body.innerHTML = `
    <div class="cards-edit" style="max-width:640px;">
      <label>Name</label>
      <input type="text" id="ceName" value="${escapeHtml(c.name)}" maxlength="32">
      <label>SelectorA</label>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="number" id="ceSelA" value="${c.selectorA}" min="0" max="127" style="width:96px;">
        <span class="hint">0–127 · drives Host SelA / Sysex trigger</span>
      </div>
      <label>Color</label>
      <div class="color-row" id="ceColor">
        ${COLORS.map(col => `
          <span class="color-dot ${col.id === c.color ? "selected" : ""}" data-color="${col.id}" style="background:${col.fill}"></span>
        `).join("")}
      </div>
      <label>Snapshots</label>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="preview" style="width:120px;height:36px;border:1px solid var(--line);border-radius:var(--r-2);background:rgba(0,0,0,0.36);padding:3px 4px;">
          <div class="pv-label" style="font-family:var(--mono);font-size:8px;letter-spacing:0.14em;color:var(--faint);text-transform:uppercase;">MSEG</div>
          <svg viewBox="0 0 80 24" preserveAspectRatio="none" style="width:100%;height:24px;display:block;"><path d="${msegPath(c.msegSeed)}" fill="none" stroke="${color.fill}" stroke-width="1.4"/></svg>
        </div>
        <div class="preview" style="width:120px;height:36px;border:1px solid var(--line);border-radius:var(--r-2);background:rgba(0,0,0,0.36);padding:3px 4px;">
          <div class="pv-label" style="font-family:var(--mono);font-size:8px;letter-spacing:0.14em;color:var(--faint);text-transform:uppercase;">GAIN ADSR</div>
          <svg viewBox="0 0 80 24" preserveAspectRatio="none" style="width:100%;height:24px;display:block;"><path d="${adsrPath(c.adsr)}" fill="none" stroke="${color.fill}" stroke-width="1.4"/></svg>
        </div>
        <span class="hint" style="font-size:10px;">Captured from current patch</span>
      </div>
    </div>`;

  $("#btnAdd").addEventListener("click", addCard);
  $("#btnClone").addEventListener("click", cloneCurrentState);
  $("#btnRename").addEventListener("click", () => {
    const inp = $("#ceName"); if (!inp) return;
    inp.focus(); inp.select();
    setStatus(`Editing name — type to rename.`, "info");
  });
  $("#btnDuplicate").addEventListener("click", duplicateSelectedCard);
  $("#btnDelete").addEventListener("click", deleteSelectedCard);
  $("#ceName").addEventListener("input", e => {
    c.name = e.target.value || "Untitled";
    renderCardsStrip(); renderHeader();
    setStatus(`Renamed → "${c.name}"`, "info");
  });
  $("#ceSelA").addEventListener("input", e => {
    let v = parseInt(e.target.value, 10);
    if (!Number.isFinite(v)) v = 0;
    v = Math.max(0, Math.min(127, v));
    c.selectorA = v;
    e.target.value = v;
    renderCardsStrip();
    setStatus(`"${c.name}" selectorA → ${v}`, "info");
  });
  $$(".color-dot", $("#ceColor")).forEach(d => {
    d.addEventListener("click", () => {
      c.color = d.dataset.color;
      renderAll();
      setStatus(`"${c.name}" color → ${c.color}`, "info");
    });
  });
}

function addCard() {
  const used = new Set(state.cards.map(c => c.selectorA));
  let sel = 0; while (used.has(sel) && sel < 128) sel++;
  if (sel > 127) sel = 0;
  const colors = COLORS.map(c => c.id);
  const color = colors[state.cards.length % colors.length];
  const card = {
    id: newId(),
    name: "Articulation " + (state.cards.length + 1),
    selectorA: sel,
    color,
    adsr: { a: 0.04, d: 0.20, s: 0.6, r: 0.30 },
    msegSeed: Math.floor(Math.random() * 1e6),
  };
  state.cards.push(card);
  state.selectedCardId = card.id;
  renderAll();
  setStatus(`Added "${card.name}" · selectorA ${card.selectorA}`, "ok");
}

function cloneCurrentState() {
  const card = {
    id: newId(),
    name: "Live Capture " + (state.cards.length + 1),
    selectorA: nextFreeSelA(),
    color: "violet",
    adsr: { a: 0.02, d: 0.12, s: 0.78, r: 0.24 },
    msegSeed: Math.floor(Math.random() * 1e6),
  };
  state.cards.push(card);
  state.selectedCardId = card.id;
  renderAll();
  setStatus(`Cloned current patch state into "${card.name}"`, "ok");
}

function duplicateSelectedCard() {
  const c = selectedCard(); if (!c) return;
  const card = {
    ...c,
    id: newId(),
    name: c.name + " copy",
    selectorA: nextFreeSelA(),
  };
  const idx = state.cards.indexOf(c);
  state.cards.splice(idx + 1, 0, card);
  state.selectedCardId = card.id;
  renderAll();
  setStatus(`Duplicated "${c.name}" → "${card.name}"`, "ok");
}

function deleteSelectedCard() {
  const c = selectedCard(); if (!c) return;
  if (state.cards.length <= 1) {
    setStatus("Cannot delete the last card.", "warn"); return;
  }
  const idx = state.cards.indexOf(c);
  state.cards.splice(idx, 1);
  // also clear assignments referencing this card
  for (const k of Object.keys(state.keyswitches)) {
    if (state.keyswitches[k] === c.id) delete state.keyswitches[k];
  }
  state.velocityBands = state.velocityBands.filter(b => b.cardId !== c.id);
  state.selectedCardId = state.cards[Math.max(0, idx - 1)].id;
  renderAll();
  setStatus(`Deleted "${c.name}". Cleared its assignments.`, "warn");
}

function nextFreeSelA() {
  const used = new Set(state.cards.map(c => c.selectorA));
  let sel = 0; while (used.has(sel) && sel < 128) sel++;
  return sel > 127 ? 0 : sel;
}

  actions.innerHTML = `
    <button class="btn danger" id="btnDelBand" ${sel ? "" : "disabled"}>Delete band</button>
    <button class="btn" id="btnClearBands" ${state.velocityBands.length ? "" : "disabled"}>Clear all bands</button>
  `;
  body.innerHTML = `
    <div class="vel-body">
      <div class="vel-axis">
        <span>0</span><span>16</span><span>32</span><span>48</span><span>64</span><span>80</span><span>96</span><span>112</span><span>127</span>
      </div>
      <div class="vel-lane" id="velLane">
        <div class="hint" id="velHint" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;color:var(--faint);">
          ${state.velocityBands.length === 0 ? "Drag a card here to create a band" : ""}
        </div>
      </div>
    </div>`;

  const lane = $("#velLane");
  state.velocityBands.forEach(b => lane.appendChild(velBandEl(b, lane)));

  lane.addEventListener("dragover", e => {
    if (!e.dataTransfer.types.includes("application/x-cosimo-card")) return;
    e.preventDefault(); e.dataTransfer.dropEffect = "copy";
    lane.classList.add("drag-over");
  });
  lane.addEventListener("dragleave", () => lane.classList.remove("drag-over"));
  lane.addEventListener("drop", e => {
    lane.classList.remove("drag-over");
    const cid = e.dataTransfer.getData("application/x-cosimo-card");
    if (!cid) return;
    e.preventDefault();
    const card = cardById(cid); if (!card) return;
    const rect = lane.getBoundingClientRect();
    const v = Math.round(((e.clientX - rect.left) / rect.width) * 127);
    addVelocityBandAt(card.id, v);
  });

  $("#btnDelBand").addEventListener("click", () => {
    if (!sel) return;
    const card = cardById(sel.cardId);
    state.velocityBands = state.velocityBands.filter(b => b.id !== sel.id);
    state.selectedBandId = null;
    renderAll();
    setStatus(`Deleted velocity band${card ? ` for "${card.name}"` : ""}`, "warn");
  });
  $("#btnClearBands").addEventListener("click", () => {
    state.velocityBands = [];
    state.selectedBandId = null;
    renderAll();
    setStatus("Cleared all velocity bands.", "warn");
  });
}

function velBandEl(band, lane) {
  const card = cardById(band.cardId);
  const color = COLOR_BY_ID[card.color];
  const left  = (band.min / 127) * 100;
  const right = ((127 - band.max) / 127) * 100;
  const el = document.createElement("div");
  el.className = "vel-band" + (band.id === state.selectedBandId ? " selected" : "");
  el.style.left = left + "%";
  el.style.right = right + "%";
  el.style.background = `linear-gradient(180deg, ${color.fill}, ${color.fill}cc)`;
  el.style.borderColor = color.line;
  el.innerHTML = `
    <div class="vel-handle l" data-h="l"></div>
    <span class="vel-name" style="color:rgba(0,0,0,0.85);">${escapeHtml(card.name)}</span>
    <span class="vel-rng">${band.min}–${band.max}</span>
    <span class="vel-band-x" data-del="1">×</span>
    <div class="vel-handle r" data-h="r"></div>
  `;
  el.addEventListener("mousedown", e => {
    if (e.target.dataset.h) return startBandResize(e, band, lane, e.target.dataset.h);
    if (e.target.dataset.del) {
      e.stopPropagation();
      state.velocityBands = state.velocityBands.filter(b => b.id !== band.id);
      if (state.selectedBandId === band.id) state.selectedBandId = null;
      renderAll();
      setStatus(`Deleted velocity band for "${card.name}"`, "warn");
      return;
    }
    state.selectedBandId = band.id;
    renderAll();
  });
  return el;
}

function startBandResize(e, band, lane, side) {
  e.preventDefault();
  state.selectedBandId = band.id;
  const rect = lane.getBoundingClientRect();
  const onMove = ev => {
    const v = Math.round(((ev.clientX - rect.left) / rect.width) * 127);
    if (side === "l") band.min = Math.max(0, Math.min(band.max - 1, v));
    else              band.max = Math.min(127, Math.max(band.min + 1, v));
    enforceNonOverlap(band);
    renderView();
    setStatus(`Resizing "${cardById(band.cardId).name}" → ${band.min}–${band.max}`, "info");
  };
  const onUp = () => {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
    setStatus(`Velocity band → ${band.min}–${band.max}`, "ok");
  };
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup", onUp);
}

function enforceNonOverlap(focus) {
  // Push neighbours just enough so no band fully overlaps another.
  for (const b of state.velocityBands) {
    if (b.id === focus.id) continue;
    if (b.min < focus.max && b.max > focus.min) {
      // overlap exists — clip the neighbour to whichever side it sits
      if (b.min < focus.min) b.max = Math.max(b.min, focus.min - 1);
      else                   b.min = Math.min(b.max, focus.max + 1);
      if (b.max < b.min) b.max = b.min;
    }
  }
}

function addVelocityBandAt(cardId, center) {
  const span = 24;
  let min = Math.max(0, center - span);
  let max = Math.min(127, center + span);
  // shrink to fit free space around center
  for (const b of state.velocityBands) {
    if (b.cardId === cardId) continue;
    if (b.min <= center && b.max >= center) {
      // dropping inside an existing band of another card — slide to nearest free range
      min = Math.min(127, b.max + 1);
      max = Math.min(127, min + 12);
      break;
    }
    if (b.max < center && b.max + 1 > min) min = b.max + 1;
    if (b.min > center && b.min - 1 < max) max = b.min - 1;
  }
  if (max - min < 4) {
    setStatus("No room to drop a band here.", "warn"); return;
  }
  const band = { id: newId(), cardId, min, max };
  state.velocityBands.push(band);
  state.selectedBandId = band.id;
  renderAll();
  const card = cardById(cardId);
  setStatus(`Added velocity band for "${card.name}" · ${min}–${max}`, "ok");
}

// Host view
function renderHostView(title, actions, body) {
  title.innerHTML = "<b>Host</b> · selectorA values";
  actions.innerHTML = `<span class="hint">Duplicates rejected. Sysex range matches selectorA.</span>`;

  const seen = new Map();
  for (const c of state.cards) {
    if (!seen.has(c.selectorA)) seen.set(c.selectorA, []);
    seen.get(c.selectorA).push(c.id);
  }

  body.innerHTML = `
    <div class="host-body">
      <div class="host-table">
        <div class="host-thead">
          <span></span><span>Name</span><span>SelectorA</span><span>Hex / Sysex</span><span>Status</span>
        </div>
        <div class="host-rows" id="hostRows">
          ${state.cards.map(c => {
            const dup = seen.get(c.selectorA).length > 1 && seen.get(c.selectorA)[0] !== c.id;
            const isSel = (c.id === state.selectedCardId) ? " selected" : "";
            const color = COLOR_BY_ID[c.color];
            return `
              <div class="host-row${isSel}" data-cid="${c.id}">
                <span class="swatch" style="background:${color.fill};"></span>
                <span class="name">${escapeHtml(c.name)}</span>
                <span><input type="number" min="0" max="127" value="${c.selectorA}" data-sela="${c.id}" class="${dup ? "error" : ""}"></span>
                <span class="hex">0x${c.selectorA.toString(16).toUpperCase().padStart(2,"0")} · F0 7F&nbsp;${c.selectorA.toString(16).toUpperCase().padStart(2,"0")}&nbsp;F7</span>
                <span class="${dup ? "err-msg" : "hint"}">${dup ? "✕ DUPLICATE — value already used" : "✓ unique"}</span>
              </div>`;
          }).join("")}
        </div>
      </div>
    </div>`;

  $$(".host-row", body).forEach(row => {
    row.addEventListener("click", e => {
      if (e.target.tagName === "INPUT") return;
      state.selectedCardId = row.dataset.cid;
      renderAll();
    });
  });
  $$("input[data-sela]", body).forEach(inp => {
    inp.addEventListener("input", () => {
      const id = inp.dataset.sela;
      const c = cardById(id); if (!c) return;
      const raw = inp.value.trim();
      if (raw === "") return; // let the user keep typing; commit on blur
      let v = parseInt(raw, 10);
      if (!Number.isFinite(v)) v = 0;
      v = Math.max(0, Math.min(127, v));
      const dup = state.cards.some(other => other.id !== id && other.selectorA === v);
      if (dup) {
        inp.classList.add("error");
        setStatus(`SelectorA ${v} already used — choose another value.`, "err");
        return;
      }
      inp.classList.remove("error");
      c.selectorA = v;
      patchHostRow(body, c);
      renderCardsStrip(); renderHeader();
      setStatus(`"${c.name}" selectorA → ${v}`, "ok");
    });
    inp.addEventListener("blur", () => {
      const id = inp.dataset.sela;
      const c = cardById(id); if (!c) return;
      inp.value = c.selectorA;
      inp.classList.remove("error");
      patchHostRow(body, c);
    });
  });
}

function patchHostRow(body, card) {
  // Update only the changing parts of the host row, preserving input focus.
  const row = body.querySelector(`.host-row[data-cid="${card.id}"]`);
  if (!row) return;
  const hex = row.querySelector(".hex");
  if (hex) hex.innerHTML = `0x${card.selectorA.toString(16).toUpperCase().padStart(2,"0")} · F0 7F&nbsp;${card.selectorA.toString(16).toUpperCase().padStart(2,"0")}&nbsp;F7`;
  // Recompute duplicate state across all rows and update labels in place.
  const seen = new Map();
  for (const c of state.cards) {
    if (!seen.has(c.selectorA)) seen.set(c.selectorA, []);
    seen.get(c.selectorA).push(c.id);
  }
  $$(".host-row", body).forEach(r => {
    const cid = r.dataset.cid;
    const c = cardById(cid); if (!c) return;
    const peers = seen.get(c.selectorA) || [];
    const dup = peers.length > 1 && peers[0] !== c.id;
    const status = r.querySelector("span:last-child");
    const inp = r.querySelector("input[data-sela]");
    if (dup) {
      status.className = "err-msg";
      status.textContent = "✕ DUPLICATE — value already used";
      if (inp && document.activeElement !== inp) inp.classList.add("error");
    } else {
      status.className = "hint";
      status.textContent = "✓ unique";
      if (inp && document.activeElement !== inp) inp.classList.remove("error");
    }
  });
}

function renderHeader() {
  const c = selectedCard();
  $("#headSelName").textContent = c ? `${c.name} · SelA ${c.selectorA}` : "—";

  $$("button", $("#modeToggle")).forEach(b => {
    b.classList.toggle("active", b.dataset.mode === state.mode);
  });
  $$("button", $("#subTabs")).forEach(b => {

  });

  $("#subTabs").style.visibility = state.mode === "articulations" ? "visible" : "hidden";
  $("#headHint").style.visibility = state.mode === "articulations" ? "visible" : "hidden";

  $("#kbRangeLabel").textContent = `${noteLabel(KB_LO)} — ${noteLabel(KB_HI)}`;
  if (state.selectedKey != null) {
    const cid = state.keyswitches[state.selectedKey];
    const card = cardById(cid);
    $("#kbSelectedLabel").textContent = card
      ? `Selected ${noteLabel(state.selectedKey)} → ${card.name}`
      : `Selected ${noteLabel(state.selectedKey)} (unassigned)`;
  } else {
    $("#kbSelectedLabel").textContent = "No key selected";
  }
}

function renderKeyboard() {
  const root = $("#keyboard");
  root.innerHTML = "";
  // first count whites for sizing
  const whites = [];
  for (let n = KB_LO; n <= KB_HI; n++) if (!isBlack(n)) whites.push(n);
  // Build white keys
  whites.forEach(n => {
    const w = document.createElement("div");
    w.className = "key-white";
    w.dataset.note = n;
    if (state.selectedKey === n) w.classList.add("selected");
    const cid = state.keyswitches[n];
    if (cid) {
      const card = cardById(cid);
      const color = COLOR_BY_ID[card.color];
      w.classList.add("has-overlay");
      w.innerHTML += `<div class="key-overlay" style="background:${color.fill};">${escapeHtml(card.name).slice(0,8)}</div>`;
    }
    if ((n % 12) === 0) {
      w.innerHTML += `<div class="key-c-label">${noteLabel(n)}</div>`;
    }
    attachKeyDnD(w, n);
    root.appendChild(w);
  });
  // Black keys overlay (positioned absolutely)
  const totalWhites = whites.length;
  for (let n = KB_LO; n <= KB_HI; n++) {
    if (!isBlack(n)) continue;
    const prevWhite = n - 1; // the white key just below
    const idx = whites.indexOf(prevWhite);
    if (idx < 0) continue;
    const widthPct = 100 / totalWhites;
    const left = (idx + 1) * widthPct - widthPct * 0.32;
    const b = document.createElement("div");
    b.className = "key-black";
    b.dataset.note = n;
    if (state.selectedKey === n) b.classList.add("selected");
    b.style.left = left + "%";
    b.style.width = (widthPct * 0.64) + "%";
    const cid = state.keyswitches[n];
    if (cid) {
      const card = cardById(cid);
      const color = COLOR_BY_ID[card.color];
      b.innerHTML = `<div class="key-overlay" style="background:${color.fill};color:#000;">${escapeHtml(card.name).slice(0,6)}</div>`;
    }
    attachKeyDnD(b, n);
    root.appendChild(b);
  }
}

function attachKeyDnD(el, note) {
  el.addEventListener("click", () => {
    state.selectedKey = note;
    renderAll();
    const cid = state.keyswitches[note];
    setStatus(cid
      ? `Selected ${noteLabel(note)} → "${cardById(cid).name}"`
      : `Selected ${noteLabel(note)} (unassigned)`,
      "info"
    );
  });
  el.addEventListener("dragover", e => {
    const types = e.dataTransfer.types;
    if (!(types.includes("application/x-cosimo-card") || types.includes("application/x-cosimo-key"))) return;
    e.preventDefault(); e.dataTransfer.dropEffect = "move";
    el.classList.add("drag-over");
  });
  el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
  el.addEventListener("drop", e => {
    el.classList.remove("drag-over");
    const cid = e.dataTransfer.getData("application/x-cosimo-card");
    const fromKey = e.dataTransfer.getData("application/x-cosimo-key");
    if (cid) {
      e.preventDefault();
      assignKey(note, cid);
    } else if (fromKey) {
      e.preventDefault();
      moveKey(+fromKey, note);
    }
  });
  // Allow dragging an existing key assignment to another key
  if (state.keyswitches[note]) {
    el.draggable = true;
    el.addEventListener("dragstart", e => {
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("application/x-cosimo-key", String(note));
      e.dataTransfer.setData("text/plain", noteLabel(note));
      setStatus(`Moving keyswitch on ${noteLabel(note)} — drop on a new key.`, "drag");
    });
  }
}

function assignKey(note, cardId) {
  const prev = state.keyswitches[note];
  state.keyswitches[note] = cardId;
  state.selectedKey = note;
  const card = cardById(cardId);
  renderAll();
  setStatus(prev
    ? `Replaced keyswitch on ${noteLabel(note)} → "${card.name}"`
    : `Assigned ${noteLabel(note)} → "${card.name}"`,
    "ok"
  );
}

function moveKey(fromNote, toNote) {
  if (fromNote === toNote) return;
  const cid = state.keyswitches[fromNote]; if (!cid) return;
  const replaced = !!state.keyswitches[toNote];
  delete state.keyswitches[fromNote];
  state.keyswitches[toNote] = cid;
  state.selectedKey = toNote;
  renderAll();
  setStatus(replaced
    ? `Moved ${noteLabel(fromNote)} → ${noteLabel(toNote)} (replaced existing assignment)`
    : `Moved keyswitch ${noteLabel(fromNote)} → ${noteLabel(toNote)}`,
    "ok"
  );
}

      const note = state.selectedKey;
      delete state.keyswitches[note];
      renderAll();
      setStatus(`Cleared keyswitch ${noteLabel(note)}`, "warn");
      e.preventDefault();
    }
  }
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

function renderAll() {
  renderHeader();
  renderCardsStrip();
  renderView();
  renderKeyboard();
}

renderAll();
setStatus("Articulation prototype ready.", "ok");
</script>
</body>
