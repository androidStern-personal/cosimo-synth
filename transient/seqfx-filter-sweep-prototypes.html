<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SeqFX Filter Sweep Prototype</title>
  <style>
    :root {
      --bg: #f0ece6;
      --lane: #e8e4dc;
      --grid: #f8f7f5;
      --ink: #1c1c1c;
      --muted: #6f6d68;
      --hairline: #c8c2b8;
      --gridline: #eceae6;
      --barline: #d4cfc7;
      --cyan: #00b4d8;
      --coral: #e8604c;
      --orange: #f4923a;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Avenir Next, Helvetica Neue, Arial, sans-serif;
      letter-spacing: 0;
    }

    .frame {
      position: relative;
      width: min(100vw - 48px, 1120px);
      min-height: 720px;
      display: grid;
      place-items: center;
      padding: 48px 0;
      overflow: hidden;
    }

    .top-mark {
      position: absolute;
      top: 0;
      left: 50%;
      width: 360px;
      height: 128px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .top-mark div {
      position: absolute;
      height: 120px;
      transform: skewX(-42deg);
    }

    .top-mark .cyan {
      left: 82px;
      top: 0;
      width: 86px;
      background: var(--cyan);
    }

    .top-mark .coral {
      left: 150px;
      top: 0;
      width: 34px;
      background: var(--coral);
    }

    .top-mark .orange {
      left: 184px;
      top: 0;
      width: 40px;
      background: var(--orange);
    }

    .plugin {
      width: min(100%, 980px);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      background: var(--grid);
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(28, 28, 28, 0.15);
      z-index: 1;
    }

    .rail {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: var(--ink);
      color: var(--white);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .rail span {
      color: rgba(255, 255, 255, 0.78);
    }

    .rail strong {
      color: var(--white);
      font-size: 13px;
      letter-spacing: 0.14em;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      min-height: 560px;
    }

    .graph-pane {
      position: relative;
      border-right: 1px solid var(--hairline);
      background:
        linear-gradient(to right, var(--barline) 0 1px, transparent 1px) 0 0 / 128px 100%,
        linear-gradient(to right, var(--gridline) 0 1px, transparent 1px) 0 0 / 32px 100%,
        linear-gradient(to bottom, var(--hairline) 0 1px, transparent 1px) 0 0 / 100% 72px,
        var(--grid);
    }

    .graph-head {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--hairline);
      background: var(--lane);
    }

    .title {
      display: grid;
      gap: 2px;
    }

    .label {
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .mode-row {
      display: flex;
      border: 1px solid var(--hairline);
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg);
    }

    .mode-row button {
      height: 34px;
      min-width: 70px;
      border: 0;
      border-right: 1px solid var(--hairline);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mode-row button:last-child {
      border-right: 0;
    }

    .mode-row button.active {
      background: var(--ink);
      color: var(--white);
    }

    .graph-wrap {
      position: relative;
      height: 420px;
      margin: 22px;
      border: 1px solid var(--hairline);
      border-radius: 6px;
      background: rgba(248, 247, 245, 0.78);
      overflow: hidden;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .axis {
      fill: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .grid-major {
      stroke: var(--barline);
      stroke-width: 1;
    }

    .grid-minor {
      stroke: var(--gridline);
      stroke-width: 1;
    }

    .curve-base {
      fill: none;
      stroke: var(--hairline);
      stroke-width: 2;
    }

    .curve-preview {
      fill: none;
      stroke: var(--ink);
      stroke-width: 3;
    }

    .curve-start {
      fill: none;
      stroke: var(--cyan);
      stroke-width: 2;
      opacity: 0.68;
    }

    .curve-end {
      fill: none;
      stroke: var(--coral);
      stroke-width: 2;
      stroke-dasharray: 8 5;
      opacity: 0.78;
    }

    .sweep-band {
      fill: rgba(0, 180, 216, 0.13);
      stroke: var(--cyan);
      stroke-width: 1;
    }

    .tick {
      stroke: var(--ink);
      stroke-width: 1;
      opacity: 0.28;
    }

    .pin {
      fill: var(--ink);
      stroke: var(--grid);
      stroke-width: 2;
    }

    .pin.start {
      fill: var(--cyan);
    }

    .pin.end {
      fill: var(--coral);
    }

    .pin.scrub {
      fill: var(--orange);
    }

    .pin-label {
      fill: var(--ink);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: 42px;
      border-top: 1px solid var(--hairline);
      background: var(--bg);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .caption span {
      display: grid;
      place-items: center;
      border-right: 1px solid var(--hairline);
    }

    .caption span:last-child {
      border-right: 0;
    }

    .side {
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--bg);
    }

    .side-head {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--hairline);
    }

    .current {
      font-size: 21px;
      font-weight: 800;
      line-height: 1;
    }

    .controls {
      display: grid;
      gap: 0;
      align-content: start;
      border-bottom: 1px solid var(--hairline);
    }

    .control {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      min-height: 58px;
      padding: 0 14px;
      border-bottom: 1px solid var(--hairline);
    }

    .control:last-child {
      border-bottom: 0;
    }

    .control strong {
      display: block;
      font-size: 13px;
      font-weight: 800;
    }

    .control span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .value {
      min-width: 80px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--hairline);
      border-radius: 6px;
      background: var(--grid);
      font-size: 14px;
      font-weight: 800;
    }

    .value.cyan {
      border-color: var(--cyan);
    }

    .value.coral {
      border-color: var(--coral);
    }

    .value.orange {
      border-color: var(--orange);
    }

    .stripes {
      padding: 18px 14px 22px;
    }

    .stripe {
      height: 6px;
      margin-top: 7px;
      transform: skewX(-26deg);
      transform-origin: left center;
    }

    .stripe.cyan { background: var(--cyan); }
    .stripe.coral { background: var(--coral); }
    .stripe.orange { background: var(--orange); }

    @media (max-width: 860px) {
      .frame {
        width: min(100vw - 24px, 640px);
        padding: 24px 0;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .graph-pane {
        border-right: 0;
        border-bottom: 1px solid var(--hairline);
      }

      .side {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top-mark"><div class="cyan"></div><div class="coral"></div><div class="orange"></div></div>

    <section class="plugin" aria-label="SeqFX filter sweep prototype">
      <div class="rail">
        <span>SEQFX</span>
        <strong>FILTER SWEEP</strong>
        <span>BLOCK 02-05</span>
      </div>

      <div class="content">
        <main class="graph-pane">
          <div class="graph-head">
            <div class="title">
              <div class="label">Sweep band preview</div>
              <h1>Lowpass movement</h1>
            </div>
            <div class="mode-row" aria-label="Filter mode">
              <button class="active">LP</button>
              <button>HP</button>
              <button>BP</button>
            </div>
          </div>

          <div class="graph-wrap">
            <svg id="sweep-graph" viewBox="0 0 640 420" role="img" aria-label="Filter response with start end sweep band and scrub preview"></svg>
            <div class="caption">
              <span>Start 220 Hz</span>
              <span>Preview 58%</span>
              <span>End 5.2 kHz</span>
              <span>Curve 2.2</span>
            </div>
          </div>
        </main>

        <aside class="side">
          <div class="side-head">
            <div class="current">Filter</div>
            <div class="label">Inspector</div>
          </div>

          <div class="controls">
            <div class="control">
              <div><strong>Start cutoff</strong><span>Drag cyan pin</span></div>
              <div class="value cyan">220</div>
            </div>
            <div class="control">
              <div><strong>End cutoff</strong><span>Drag coral pin</span></div>
              <div class="value coral">5.2k</div>
            </div>
            <div class="control">
              <div><strong>Resonance</strong><span>Vertical drag</span></div>
              <div class="value">4.2</div>
            </div>
            <div class="control">
              <div><strong>Curve</strong><span>Shape of sweep</span></div>
              <div class="value orange">2.2</div>
            </div>
          </div>

          <div class="stripes" aria-hidden="true">
            <div class="stripe cyan"></div>
            <div class="stripe coral"></div>
            <div class="stripe orange"></div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <script>
    const minHz = 20;
    const maxHz = 20000;
    const startHz = 220;
    const endHz = 5200;
    const q = 4.2;
    const curvePower = 2.2;
    const width = 640;
    const height = 420;
    const pad = { left: 46, right: 28, top: 28, bottom: 82 };
    const plotWidth = width - pad.left - pad.right;
    const plotHeight = height - pad.top - pad.bottom;
    const plotBottom = height - pad.bottom;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normHz(hz) {
      const minLog = Math.log(minHz);
      const maxLog = Math.log(maxHz);
      return clamp((Math.log(clamp(hz, minHz, maxHz)) - minLog) / (maxLog - minLog), 0, 1);
    }

    function hzFromNorm(normalized) {
      const minLog = Math.log(minHz);
      const maxLog = Math.log(maxHz);
      return Math.exp(minLog + ((maxLog - minLog) * clamp(normalized, 0, 1)));
    }

    function logLerpHz(start, end, amount) {
      return Math.exp(Math.log(start) + ((Math.log(end) - Math.log(start)) * clamp(amount, 0, 1)));
    }

    function curve01(phase) {
      return Math.pow(clamp(phase, 0, 1), clamp(curvePower, 0.25, 4));
    }

    function xForHz(hz) {
      return pad.left + (plotWidth * normHz(hz));
    }

    function yForDb(db) {
      const normalized = clamp((db + 28) / 42, 0, 1);
      return plotBottom - (plotHeight * normalized);
    }

    function responseDb(freq, cutoff) {
      const ratio = Math.max(0.001, freq / cutoff);
      const lowpass = 1 / Math.sqrt(1 + Math.pow(ratio, 4));
      const distance = Math.log2(Math.max(freq, 1) / cutoff);
      const bump = Math.exp(-(distance * distance) / 0.035) * Math.log2(q + 1) * 4.8;
      return 20 * Math.log10(Math.max(0.0001, lowpass)) + bump;
    }

    function responsePath(cutoff) {
      const points = [];
      for (let i = 0; i < 112; i += 1) {
        const n = i / 111;
        const hz = hzFromNorm(n);
        const x = pad.left + (plotWidth * n);
        const y = yForDb(responseDb(hz, cutoff));
        points.push(`${i === 0 ? "M" : "L"} ${x.toFixed(2)} ${y.toFixed(2)}`);
      }
      return points.join(" ");
    }

    function el(name, attrs = {}, children = []) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attrs)) {
        node.setAttribute(key, value);
      }
      for (const child of children) {
        node.appendChild(child);
      }
      return node;
    }

    function text(x, y, content, attrs = {}) {
      const node = el("text", { x, y, class: "axis", ...attrs });
      node.textContent = content;
      return node;
    }

    function drawGraph() {
      const svg = document.getElementById("sweep-graph");
      const frequencyTicks = [
        [20, "20"],
        [50, "50"],
        [100, "100"],
        [200, "200"],
        [500, "500"],
        [1000, "1k"],
        [2000, "2k"],
        [5000, "5k"],
        [10000, "10k"],
        [20000, "20k"],
      ];
      const dbTicks = [
        [-24, "-24"],
        [-12, "-12"],
        [0, "0"],
        [12, "+12"],
      ];

      for (const [hz, label] of frequencyTicks) {
        const x = xForHz(hz);
        const major = hz === 20 || hz === 100 || hz === 1000 || hz === 10000 || hz === 20000;
        svg.appendChild(el("line", { x1: x, y1: pad.top, x2: x, y2: plotBottom, class: major ? "grid-major" : "grid-minor" }));
        if (major || hz === 500 || hz === 5000) {
          svg.appendChild(text(x, height - 58, label, { "text-anchor": "middle" }));
        }
      }

      for (const [db, label] of dbTicks) {
        const y = yForDb(db);
        svg.appendChild(el("line", { x1: pad.left, y1: y, x2: width - pad.right, y2: y, class: db === 0 ? "grid-major" : "grid-minor" }));
        svg.appendChild(text(14, y + 4, label));
      }

      svg.appendChild(el("line", { x1: pad.left, y1: plotBottom, x2: width - pad.right, y2: plotBottom, class: "grid-major" }));
      svg.appendChild(el("line", { x1: pad.left, y1: pad.top, x2: pad.left, y2: plotBottom, class: "grid-major" }));

      const startX = xForHz(startHz);
      const endX = xForHz(endHz);
      const scrubT = 0.58;
      const scrubHz = logLerpHz(startHz, endHz, curve01(scrubT));
      const scrubX = xForHz(scrubHz);
      const bandTop = plotBottom + 26;
      const bandHeight = 14;

      svg.appendChild(el("rect", {
        x: Math.min(startX, endX),
        y: bandTop,
        width: Math.abs(endX - startX),
        height: bandHeight,
        rx: 4,
        class: "sweep-band",
      }));

      for (let i = 0; i <= 4; i += 1) {
        const hz = logLerpHz(startHz, endHz, curve01(i / 4));
        const x = xForHz(hz);
        svg.appendChild(el("line", { x1: x, y1: bandTop - 7, x2: x, y2: bandTop + bandHeight + 7, class: "tick" }));
      }

      svg.appendChild(el("path", { d: responsePath(startHz), class: "curve-start" }));
      svg.appendChild(el("path", { d: responsePath(endHz), class: "curve-end" }));
      svg.appendChild(el("path", { d: responsePath(scrubHz), class: "curve-preview" }));

      const previewY = yForDb(responseDb(scrubHz, scrubHz));
      svg.appendChild(el("line", { x1: scrubX, y1: previewY, x2: scrubX, y2: bandTop + bandHeight, class: "tick" }));
      svg.appendChild(el("circle", { cx: startX, cy: bandTop + bandHeight / 2, r: 9, class: "pin start" }));
      svg.appendChild(el("circle", { cx: endX, cy: bandTop + bandHeight / 2, r: 9, class: "pin end" }));
      svg.appendChild(el("circle", { cx: scrubX, cy: previewY, r: 8, class: "pin scrub" }));
      svg.appendChild(el("circle", { cx: scrubX, cy: bandTop + bandHeight / 2, r: 7, class: "pin scrub" }));
      svg.appendChild(text(startX, bandTop - 12, "START", { class: "pin-label", "text-anchor": "middle" }));
      svg.appendChild(text(endX, bandTop - 12, "END", { class: "pin-label", "text-anchor": "middle" }));
      svg.appendChild(text(scrubX + 13, previewY - 10, "PREVIEW", { class: "pin-label" }));
    }

    drawGraph();
  </script>
</body>
</html>
